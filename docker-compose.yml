    container_name: cointpairs_v02_bnbsol
    restart: unless-stopped
    profiles: ["v02"]
    ports:
      - "8084:8080"
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config:/freqtrade/config
    environment:
      - FT_PROVIDER=ccxt
    command: >
      trade
      --config /freqtrade/config/config_cointpairs_l_phase1_bnb_sol.json
