    environment:
      - FT_PROVIDER=ccxt
    command: >
      trade
      --config /freqtrade/config/config_cointpairs_l_phase1.json
      --strategy EnhancedCointPairsStrategy_V02
      --db-url sqlite:////freqtrade/user_data/tradesv3.v02.btceth.sqlite
      --logfile /freqtrade/user_data/logs/freqtrade_v02_btceth.log
